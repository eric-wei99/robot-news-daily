name: 人形机器人每日资讯

on:
  schedule:
    # 每天北京时间 8:20 / 8:30 / 8:40 (UTC 0:20/0:30/0:40) — 三重冗余
    - cron: '20 0 * * *'
    - cron: '30 0 * * *'
    - cron: '40 0 * * *'
  workflow_dispatch:

# 同一时间只跑一个
concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  daily-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check if already sent today
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          # 用 jq 精确过滤：排除当前 run，只查今天已成功的 schedule 运行
          SENT=$(gh run list --repo ${{ github.repository }} --event schedule --json createdAt,conclusion,databaseId --limit 20 --jq "[.[] | select(.databaseId != ${{ github.run_id }} and (.createdAt | startswith(\"$TODAY\")) and .conclusion == \"success\")] | length" 2>/dev/null || echo "0")
          echo "Prior successful runs today: $SENT"
          if [ "$SENT" != "0" ] && [ -n "$SENT" ]; then
            echo "already_sent=true" >> $GITHUB_OUTPUT
          else
            echo "already_sent=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.already_sent != 'true'
        run: pip install requests beautifulsoup4

      - name: Search and send news
        if: steps.check.outputs.already_sent != 'true'
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python3 send_news.py

      - name: Log skip
        if: steps.check.outputs.already_sent == 'true'
        run: echo "⏭ 今日已发送，跳过 (冗余触发)"
